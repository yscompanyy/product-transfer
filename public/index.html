<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트스토어 상품 이전 도구</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f5f6fa; color: #333; }
  .container { max-width: 720px; margin: 40px auto; padding: 0 20px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #03c75a; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 30px; }
  .card { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: #222; }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
  input:focus { border-color: #03c75a; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .field { margin-bottom: 16px; }
  .btn { width: 100%; padding: 13px; background: #03c75a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #02a84a; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn-dl { background: #1a73e8; margin-top: 12px; }
  .btn-dl:hover { background: #1557b0; }
  .progress-wrap { margin-top: 16px; }
  .progress-bar-bg { background: #eee; border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar { height: 10px; background: #03c75a; border-radius: 20px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 13px; color: #666; margin-top: 8px; text-align: center; }
  .log { background: #f8f9fa; border-radius: 8px; padding: 14px; font-size: 12px; color: #555; max-height: 180px; overflow-y: auto; margin-top: 14px; line-height: 1.7; }
  .log .err { color: #e53e3e; }
  .log .ok { color: #03c75a; }
  .result-box { display: none; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat { background: #f0fff4; border-radius: 8px; padding: 14px; text-align: center; }
  .stat .num { font-size: 24px; font-weight: 700; color: #03c75a; }
  .stat .lbl { font-size: 12px; color: #666; margin-top: 4px; }
  .notice { font-size: 12px; color: #888; background: #fffbe6; border-left: 3px solid #f6c000; padding: 10px 14px; border-radius: 0 8px 8px 0; margin-top: 12px; line-height: 1.7; }
</style>
</head>
<body>
<div class="container">
  <h1>🛒 스마트스토어 상품 이전 도구</h1>
  <p class="subtitle">A 스토어 상품을 네이버 일괄등록 엑셀 양식으로 추출합니다</p>

  <div class="card">
    <h2>🔑 A 스토어 API 정보 입력</h2>
    <div class="field">
      <label>클라이언트 ID</label>
      <input type="text" id="clientId" placeholder="애플리케이션 클라이언트 ID">
    </div>
    <div class="field">
      <label>클라이언트 Secret</label>
      <input type="password" id="clientSecret" placeholder="애플리케이션 클라이언트 Secret">
    </div>
    <button class="btn" id="startBtn" onclick="startFetch()">상품 추출 시작</button>
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-text" id="progressText">준비 중...</div>
    </div>
    <div class="log" id="log" style="display:none"></div>
  </div>

  <div class="card result-box" id="resultBox">
    <h2>✅ 추출 완료</h2>
    <div class="stat-grid">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">전체 상품</div></div>
      <div class="stat"><div class="num" id="statOption">0</div><div class="lbl">옵션 상품</div></div>
      <div class="stat"><div class="num" id="statNoOption">0</div><div class="lbl">단순 상품</div></div>
    </div>
    <button class="btn btn-dl" onclick="downloadExcel()">📥 네이버 일괄등록 엑셀 다운로드</button>
    <div class="notice">
      ⚠️ 다운로드 후 확인사항<br>
      · 카테고리코드 — B 스토어 카테고리와 맞는지 확인<br>
      · 배송비 템플릿코드 — B 스토어에서 새로 발급 후 교체<br>
      · 이미지 URL — 대부분 정상이나 일부 깨질 수 있음
    </div>
  </div>
</div>

<script>
let allProducts = [];

function log(msg, type = '') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${type}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct, text) {
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
}

async function startFetch() {
  const clientId = document.getElementById('clientId').value.trim();
  const clientSecret = document.getElementById('clientSecret').value.trim();
  if (!clientId || !clientSecret) { alert('클라이언트 ID와 Secret을 입력해주세요.'); return; }

  document.getElementById('startBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('log').innerHTML = '';
  document.getElementById('resultBox').style.display = 'none';
  allProducts = [];

  log('상품 목록 조회 시작...');
  setProgress(5, '첫 페이지 조회 중...');

  try {
    let page = 1;
    const size = 100;
    let total = 0;
    let hasMore = true;

    while (hasMore) {
      const res = await fetch('/api/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId, clientSecret, page, size })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      total = data.total;
      allProducts = allProducts.concat(data.products);
      hasMore = data.hasMore;

      const pct = Math.min(90, Math.round((allProducts.length / total) * 90));
      setProgress(pct, `${allProducts.length} / ${total} 상품 조회 중...`);
      log(`<span class="ok">페이지 ${page} 완료 — ${allProducts.length}개 누적</span>`);
      page++;

      if (hasMore) await new Promise(r => setTimeout(r, 300));
    }

    setProgress(100, `완료! 총 ${allProducts.length}개 상품 추출`);
    log(`<span class="ok">✅ 전체 ${allProducts.length}개 상품 추출 완료!</span>`);

    const optionCount = allProducts.filter(p => {
      const opts = p?.smartstoreChannelProduct?.naverShoppingRegistration?.optionInfo;
      return opts && opts.optionCombinations && opts.optionCombinations.length > 0;
    }).length;

    document.getElementById('statTotal').textContent = allProducts.length;
    document.getElementById('statOption').textContent = optionCount;
    document.getElementById('statNoOption').textContent = allProducts.length - optionCount;
    document.getElementById('resultBox').style.display = 'block';

  } catch (e) {
    log(`<span class="err">❌ 오류: ${e.message}</span>`);
    setProgress(0, '오류 발생');
  } finally {
    document.getElementById('startBtn').disabled = false;
  }
}

function getOptionStr(combinations, field) {
  if (!combinations || combinations.length === 0) return '';
  return combinations.map(c => c[field] ?? 0).join(',');
}

function downloadExcel() {
  if (allProducts.length === 0) { alert('먼저 상품을 추출해주세요.'); return; }

  const headers = [
    '판매자 상품코드','카테고리코드','상품명','상품상태','판매가',
    '단위가격 사용여부','표시용량','표시단위','총용량','부가세','관부가세',
    '재고수량','옵션형태','옵션명','옵션값','옵션가','옵션 재고수량',
    '직접입력 옵션','추가상품명','추가상품값','추가상품가','추가상품 재고수량',
    '대표이미지','추가이미지','상세설명','브랜드','제조사','제조일자','유효일자',
    '원산지코드','수입사','복수원산지여부','원산지 직접입력','미성년자 구매',
    '배송비 템플릿코드','배송방법','택배사코드','배송비유형','기본배송비',
    '배송비 결제방식','조건부무료- 상품판매가 합계','수량별부과-수량',
    '구간별- 2구간수량','구간별- 3구간수량','구간별- 3구간배송비','구간별- 추가배송비',
    '반품배송비','교환배송비','지역별 차등 배송비','별도설치비'
  ];

  const rows = allProducts.map(p => {
    const origin = p?.originProduct || {};
    const channel = p?.smartstoreChannelProduct || {};
    const nsr = channel?.naverShoppingRegistration || {};
    const optInfo = nsr?.optionInfo || {};
    const combos = optInfo?.optionCombinations || [];
    const optGroups = optInfo?.optionGroupList || [];
    const images = origin?.images || {};
    const delivery = origin?.deliveryInfo || {};
    const deliveryFee = delivery?.deliveryFee || {};

    // 옵션명, 옵션값 추출
    let optionType = '';
    let optionNames = '';
    let optionValues = '';
    let optionPrices = '';
    let optionStocks = '';

    if (combos.length > 0) {
      optionType = optGroups.length > 1 ? '조합형' : '단독형';
      optionNames = optGroups.map(g => g.groupName).join('\n');
      // 첫번째 옵션 기준으로 값 정리
      const firstGroupValues = [...new Set(combos.map(c => c.optionName1))];
      optionValues = firstGroupValues.join(',');
      if (optGroups.length > 1) {
        const secondGroupValues = [...new Set(combos.map(c => c.optionName2).filter(Boolean))];
        optionValues = firstGroupValues.join(',') + '\n' + secondGroupValues.join(',');
      }
      optionPrices = firstGroupValues.map(v => {
        const found = combos.find(c => c.optionName1 === v);
        return found?.price ?? 0;
      }).join(',');
      optionStocks = firstGroupValues.map(v => {
        const found = combos.find(c => c.optionName1 === v);
        return found?.stockQuantity ?? 0;
      }).join(',');
    }

    const additionalImages = (images?.optionalImages || []).map(i => i.url).join('\n');

    return [
      origin?.sellerManagementCode || '',
      nsr?.categoryId || '',
      origin?.name || '',
      '신상품',
      origin?.salePrice || '',
      'N', '', '', '', '과세상품', '부과 대상 아님',
      origin?.stockQuantity || 0,
      optionType,
      optionNames,
      optionValues,
      optionPrices,
      optionStocks,
      '', '', '', '', '',
      images?.representativeImage?.url || '',
      additionalImages,
      origin?.detailContent || '',
      origin?.brand || '',
      origin?.manufacturer || '',
      '', '', '00', '', 'N', '', 'Y',
      '', // 배송비 템플릿코드 (B스토어에서 재설정 필요)
      deliveryFee?.deliveryType ? '택배, 소포, 등기' : '',
      '', // 택배사코드
      deliveryFee?.deliveryFeeType || '',
      deliveryFee?.baseFee || '',
      '', '', '', '', '', '', '',
      deliveryFee?.returnFee || '',
      deliveryFee?.exchangeFee || '',
      '', 'N'
    ];
  });

  const wb = XLSX.utils.book_new();
  const wsData = [headers, ...rows];
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = headers.map(() => ({ wch: 18 }));
  XLSX.utils.book_append_sheet(wb, ws, '일괄등록');
  XLSX.writeFile(wb, '상품이전_일괄등록.xlsx');
}
</script>
</body>
</html>
